<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fundos Imobiliários</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.2/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-primary">
      <a class="navbar-brand" href="index.html">
        <i class="bi bi-building"></i>
        Fundos Imobiliários
      </a>
    </nav>

    <div class="container">
      <!-- <div class="header">
        <h1>Fundos Imobiliários</h1>
      </div> -->

      <div class="content">
        <div class="calculardarfparafiis">
          <h2>Cálculo da venda de FIIs</h2>
          <p>
            <label>Qual seu Preço Médio do FII?</label>
          </p>
          <p>
            <input type="text" class="form-control" id="precoMedio" />
          </p>
          <p>
            <label>Quantas cotas você vendeu?</label>
          </p>
          <p>
            <input type="text" class="form-control" id="quantidadeDeCotas" />
          </p>
          <p>
            <label>Qual valor da cota no momento da venda?</label>
          </p>
          <p>
            <input type="text" class="form-control" id="valorDeVenda" />
          </p>
          <button class="btn btn-primary" onclick="calcularDarf()">
            Realizar os cálculos
          </button>
          <button class="btn btn-danger separator" onclick="limparDarf()">
            Limpar
          </button>
          <section class="alert alert-primary" role="alert" id="resultadoVenda">
            <p>Seu lucro líquido na operação foi de ...</p>
          </section>
        </div>

        <hr />

        <div class="yieldoncost">
          <h2>Cálculo do Yield on Cost (YOC)</h2>
          <p>
            <label>Qual seu custo médio de aquisição?</label>
          </p>
          <p>
            <input type="text" class="form-control" id="precoAquisicao" />
          </p>
          <p>
            <label>Quanto rendeu no último mês?</label>
          </p>
          <p>
            <input type="text" class="form-control" id="rendimento" />
          </p>
          <button class="btn btn-primary" onclick="calcularYieldOnCost()">
            Realizar os cálculos
          </button>
          <button
            class="btn btn-danger separator"
            onclick="limparYieldOnCost()"
          >
            Limpar
          </button>
          <section class="alert alert-primary" role="alert" id="resultadoMes">
            <p>Seu yield on cost foi de ... nesse mês.</p>
          </section>
          <section class="alert alert-primary" role="alert" id="resultadoAno">
            <p>A rentabilidade anualizada seria de ...</p>
          </section>
        </div>
      </div>

      <div class="d-flex justify-content-center">
        <footer>
          <p>
            <a
              class="text-decoration-none"
              href="https://linkedin.com/in/carlosxfelipe"
            >
              <code>@carlosxfelipe</code>
              <i class="bi text-danger bi-heart-fill"></i>
              <i class="bi text-warning bi-filetype-js"></i>
            </a>
          </p>
        </footer>
      </div>
    </div>

    <script src="assets/js/calculardarfparafiis.js"></script>
    <script src="assets/js/yieldoncost.js"></script>
    <script src="assets/js/limpar.js"></script>
  </body>
</html>
